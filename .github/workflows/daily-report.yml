name: daily-stock-report

on:
  schedule:
    # 08:35 KST, Monday-Friday: 장전 관심 후보 압축
    - cron: '35 8 * * 1-5'
      timezone: 'Asia/Seoul'
    # 16:05 KST, Monday-Friday: 장마감 다음날 후보 정리
    - cron: '5 16 * * 1-5'
      timezone: 'Asia/Seoul'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-stock-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-report:
    runs-on: ubuntu-latest

    env:
      NOTEBOOK_FILE: 실전매매_통합시스템_v10_2_연속추천관찰_자동조건검색_드라이브준비.ipynb

      CANDIDATE_SOURCE_MODE: HYBRID
      REQUIRE_TOSS_FILE: "false"
      TOSS_MANUAL_CSV_FILE: TOSS_수동후보.csv

      # v10.8 이후 기준: 영어 파일명만 공식 입력으로 사용
      HOLDINGS_CSV_FILE: holdings_manual_input.csv
      TRADE_LOG_CSV_FILE: trade_log_manual_input.csv

      USE_GOOGLE_DRIVE: "false"
      REPORT_ROOT_MODE: LOCAL

      OPEN_DART_API_KEY: ${{ secrets.OPEN_DART_API_KEY }}
      DART_API_KEY: ${{ secrets.OPEN_DART_API_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      ENABLE_OPENAI_NEWS_ANALYSIS: "false"
      ENABLE_GEMINI_NEWS_ANALYSIS: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set report session by KST
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          now = datetime.now(ZoneInfo("Asia/Seoul"))
          mode = "AM_PREMARKET" if now.hour < 12 else "PM_CLOSE"
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"REPORT_RUN_MODE={mode}\n")
              f.write(f"REPORT_CREATED_AT_KST={now.isoformat()}\n")
          print("KST:", now.isoformat(), "REPORT_RUN_MODE:", mode)
          PY

      - name: Show repository files and manual input status
        run: |
          echo "Current directory:"
          pwd
          echo "Root files:"
          ls -la
          echo "Scripts:"
          ls -la automation/scripts || true
          echo "Manual input files:"
          ls -la holdings_manual_input.csv trade_log_manual_input.csv || true
          echo "Legacy Korean input files, ignored if English files exist:"
          ls -la 보유종목_수동입력.csv 매매기록_수동입력.csv || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate TOSS manual candidate file
        run: |
          python automation/scripts/validate_toss_csv.py "$TOSS_MANUAL_CSV_FILE"

      - name: Hotfix source notebook before runtime copy
        run: |
          python automation/scripts/hotfix_v102_series_or.py "$NOTEBOOK_FILE"

      - name: Prepare runtime notebook
        run: |
          python automation/scripts/patch_notebook_config.py "$NOTEBOOK_FILE" "_runtime_report.ipynb"

      - name: Hotfix runtime notebook before execute
        run: |
          python automation/scripts/hotfix_v102_series_or.py "_runtime_report.ipynb"

      - name: Run report notebook
        run: |
          jupyter nbconvert --to notebook --execute "_runtime_report.ipynb" --output executed_report.ipynb --ExecutePreprocessor.timeout=5400

      - name: Add Naver news summary
        run: |
          python automation/scripts/add_naver_news_summary.py

      - name: Update holdings and trade log sheets
        run: |
          python automation/scripts/update_holdings_report.py

      - name: Rebuild clean HTML briefing report
        run: |
          python automation/scripts/rebuild_clean_html_report.py

      - name: Build v11 performance and holdings decision dashboard
        run: |
          if [ -f automation/scripts/build_v11_performance_holding_dashboard.py ]; then
            python automation/scripts/build_v11_performance_holding_dashboard.py
          else
            echo "skip: build_v11_performance_holding_dashboard.py not found"
          fi

      - name: Build v11.2 deep holdings analysis
        run: |
          if [ -f automation/scripts/build_v11_2_deep_holding_analysis.py ]; then
            python automation/scripts/build_v11_2_deep_holding_analysis.py
          else
            echo "skip: build_v11_2_deep_holding_analysis.py not found"
          fi

      - name: Build v11.3 detail HTML and workbook cleanup
        run: |
          if [ -f automation/scripts/build_v11_3_detail_html_and_cleanup.py ]; then
            python automation/scripts/build_v11_3_detail_html_and_cleanup.py
          else
            echo "skip: build_v11_3_detail_html_and_cleanup.py not found"
          fi

      - name: Build v11.4 recommendation strategy validation
        run: |
          if [ -f automation/scripts/build_v11_4_strategy_validation.py ]; then
            python automation/scripts/build_v11_4_strategy_validation.py
          else
            echo "skip: build_v11_4_strategy_validation.py not found"
          fi

      - name: Ensure holding deep CSV exports
        run: |
          python automation/scripts/ensure_holding_deep_exports.py

      - name: Archive AM/PM session report
        run: |
          python automation/scripts/archive_session_report.py

      - name: Publish mobile latest pages and Google Sheets CSV
        run: |
          if [ -f automation/scripts/publish_mobile_and_sheets.py ]; then
            python automation/scripts/publish_mobile_and_sheets.py
          else
            echo "skip: publish_mobile_and_sheets.py not found"
          fi

      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs stock_report *.xlsx *.zip executed_report.ipynb recommendation_tracking.csv || true
          git commit -m "Update daily stock report" || echo "No changes to commit"
          git push || true
