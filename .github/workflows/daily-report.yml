name: daily-stock-report
# v12.2.15 invalid workflow fix

on:
  schedule:
    # 08:00 KST, Monday-Friday = 23:00 UTC, Sunday-Thursday
    - cron: '0 23 * * 0-4'
    # 16:05 KST, Monday-Friday = 07:05 UTC, Monday-Friday
    - cron: '5 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-stock-report-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-report:
    runs-on: ubuntu-latest
    env:
      NOTEBOOK_FILE: 실전매매_통합시스템_v10_2_연속추천관찰_자동조건검색_드라이브준비.ipynb
      CANDIDATE_SOURCE_MODE: HYBRID
      REQUIRE_TOSS_FILE: "false"
      TOSS_MANUAL_CSV_FILE: TOSS_수동후보.csv
      HOLDINGS_CSV_FILE: holdings_manual_input.csv
      TRADE_LOG_CSV_FILE: trade_log_manual_input.csv
      USE_GOOGLE_DRIVE: "false"
      REPORT_ROOT_MODE: LOCAL
      OPEN_DART_API_KEY: ${{ secrets.OPEN_DART_API_KEY }}
      DART_API_KEY: ${{ secrets.OPEN_DART_API_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-3.5-flash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          pwd
          ls -la
          ls -la automation/scripts || true
          ls -la holdings_manual_input.csv trade_log_manual_input.csv || true
          echo "NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:+OK}"
          echo "NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:+OK}"
          echo "TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:+OK}"
          echo "TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:+OK}"
          echo "GEMINI_API_KEY: ${GEMINI_API_KEY:+OK}"
          echo "GEMINI_MODEL: ${GEMINI_MODEL}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate TOSS manual candidate file
        run: |
          python automation/scripts/validate_toss_csv.py "$TOSS_MANUAL_CSV_FILE"

      - name: Hotfix source notebook before runtime copy
        run: |
          if [ -f automation/scripts/hotfix_v102_series_or.py ]; then
            python automation/scripts/hotfix_v102_series_or.py "$NOTEBOOK_FILE"
          else
            echo "hotfix_v102_series_or.py not found; skip"
          fi

      - name: Prepare runtime notebook
        run: |
          python automation/scripts/patch_notebook_config.py "$NOTEBOOK_FILE" "_runtime_report.ipynb"

      - name: Hotfix runtime notebook before execute
        run: |
          if [ -f automation/scripts/hotfix_v102_series_or.py ]; then
            python automation/scripts/hotfix_v102_series_or.py "_runtime_report.ipynb"
          else
            echo "hotfix_v102_series_or.py not found; skip"
          fi

      - name: Run report notebook
        run: |
          jupyter nbconvert --to notebook --execute "_runtime_report.ipynb" --output executed_report.ipynb --ExecutePreprocessor.timeout=5400

      - name: Optional legacy post processors
        run: |
          for f in add_naver_news_summary.py update_holdings_report.py rebuild_clean_html_report.py build_v11_performance_holding_dashboard.py build_v11_2_deep_holding_analysis.py build_v11_3_detail_html_and_cleanup.py build_v11_4_strategy_validation.py; do
            if [ -f "automation/scripts/$f" ]; then
              python "automation/scripts/$f"
            else
              echo "$f not found; skip"
            fi
          done

      - name: Fetch REAL holding current prices and REAL Naver news detail
        run: |
          python automation/scripts/fetch_realtime_holdings_prices_and_naver_news.py

      - name: Build recommendation candidate analysis
        run: |
          python automation/scripts/build_recommendation_analysis.py

      - name: Restore legacy Excel report sections
        run: |
          python automation/scripts/publish_legacy_excel_sections.py

      - name: Check Gemini API health
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '5 7 * * 1-5'
        run: |
          python automation/scripts/check_gemini_api.py

      - name: Build Gemini 3.5 Flash holding AI briefing
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '5 7 * * 1-5'
        run: |
          python automation/scripts/build_gemini_holding_ai_briefing.py

      - name: Archive AM PM session report
        run: |
          if [ -f automation/scripts/archive_session_report.py ]; then
            python automation/scripts/archive_session_report.py
          else
            echo "archive_session_report.py not found; skip"
          fi

      - name: Publish mobile latest pages and Google Sheets CSV
        run: |
          if [ -f automation/scripts/publish_mobile_and_sheets.py ]; then
            python automation/scripts/publish_mobile_and_sheets.py
          else
            echo "publish_mobile_and_sheets.py not found; skip"
          fi

      - name: Publish Excel download files
        run: |
          python automation/scripts/publish_excel_downloads.py

      - name: Force refresh latest and mobile pages
        run: |
          python automation/scripts/force_refresh_latest.py

      - name: Cleanup oversized generated archives and duplicate report packages
        run: |
          echo "Remove generated zip archives and duplicate notebook package outputs before staging."
          find . -type f \( -name '*.zip' -o -name '*_automation_package_*.zip' -o -name 'html_report_package_*.zip' \) -print || true
          find . -type f \( -name '*.zip' -o -name '*_automation_package_*.zip' -o -name 'html_report_package_*.zip' \) -delete || true

          # The notebook may create duplicated full report packages under stock_report/.
          # The live site uses docs/, so do not commit generated stock_report output trees.
          rm -rf stock_report/reports stock_report/latest stock_report/docs stock_report/html stock_report/downloads || true
          find stock_report -type f \( -name '*.zip' -o -name '*.xlsx' -o -name '*.ipynb' \) -delete 2>/dev/null || true

          # Remove any already tracked generated archive/package files from the index.
          git rm --cached -r --ignore-unmatch '*.zip' '**/*.zip' || true
          git rm --cached -r --ignore-unmatch stock_report/reports stock_report/latest stock_report/docs stock_report/html stock_report/downloads || true

      - name: Commit generated report
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Sync with remote before staging to avoid non-fast-forward push failures."
          git fetch origin main
          git pull --rebase --autostash origin main || {
            echo "Rebase failed. Abort and continue with current generated files."
            git rebase --abort || true
          }

          echo "Cleanup before staging."
          find . -type f \( -name '*.zip' -o -name '*_automation_package_*.zip' -o -name 'html_report_package_*.zip' \) -delete || true
          rm -rf stock_report/reports stock_report/latest stock_report/docs stock_report/html stock_report/downloads || true
          find stock_report -type f \( -name '*.zip' -o -name '*.xlsx' -o -name '*.ipynb' \) -delete 2>/dev/null || true

          echo "Changed files before staging:"
          git status --short

          # Stage only files actually needed for the published GitHub Pages site and lightweight data.
          git add -A docs || true
          git add -A .github workflows automation .gitignore README*.md VERIFICATION_RESULT.txt || true

          # Keep root input/source files that are intentionally small and user-maintained.
          for f in holdings_manual_input.csv trade_log_manual_input.csv TOSS_수동후보.csv TOSS_수동후보_예시.csv requirements.txt; do
            if [ -e "$f" ]; then
              git add "$f"
            fi
          done

          # Never commit generated archives, notebooks, duplicated stock_report outputs, or root generated xlsx.
          git reset -- '*.zip' '**/*.zip' '*.ipynb' '**/*.ipynb' || true
          git reset -- 'stock_report/**' || true
          git reset -- '*.xlsx' || true

          echo "Staged files:"
          git diff --cached --name-status || true

          if git diff --cached --quiet; then
            echo "No staged changes to commit"
            exit 0
          fi

          git commit -m "Update daily stock report"

          echo "Push with remote rebase retry."
          for attempt in 1 2 3; do
            echo "Push attempt $attempt"
            if git push; then
              echo "Push succeeded"
              exit 0
            fi
            echo "Push failed. Fetch/rebase and retry."
            git fetch origin main
            git pull --rebase --autostash origin main || {
              git rebase --abort || true
              sleep 5
            }
            sleep 5
          done

          echo "Push failed after retries"
          exit 1

      - name: Send Telegram report alert
        if: always()
        run: |
          python automation/scripts/send_telegram_report_alert.py
