name: daily-stock-report

on:
  schedule:
    # 08:00 KST, Monday-Friday
    - cron: '0 8 * * 1-5'
      timezone: 'Asia/Seoul'
    # 16:00 KST, Monday-Friday
    - cron: '0 16 * * 1-5'
      timezone: 'Asia/Seoul'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    env:
      NOTEBOOK_FILE: 실전매매_통합시스템_v10_2_연속추천관찰_자동조건검색_드라이브준비.ipynb

      CANDIDATE_SOURCE_MODE: HYBRID
      REQUIRE_TOSS_FILE: "false"
      TOSS_MANUAL_CSV_FILE: TOSS_수동후보.csv

      USE_GOOGLE_DRIVE: "false"
      REPORT_ROOT_MODE: LOCAL

      OPEN_DART_API_KEY: ${{ secrets.OPEN_DART_API_KEY }}
      DART_API_KEY: ${{ secrets.OPEN_DART_API_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      # OpenAI is opt-in. Add OPENAI_API_KEY secret and set repository variable ENABLE_OPENAI_NEWS_ANALYSIS=true to enable.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ENABLE_OPENAI_NEWS_ANALYSIS: ${{ vars.ENABLE_OPENAI_NEWS_ANALYSIS }}
      OPENAI_NEWS_MODEL: ${{ vars.OPENAI_NEWS_MODEL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set report session by KST
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          now = datetime.now(ZoneInfo("Asia/Seoul"))
          mode = "AM_PREMARKET" if now.hour < 12 else "PM_CLOSE"
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"REPORT_RUN_MODE={mode}\n")
          print("KST:", now.isoformat(), "REPORT_RUN_MODE:", mode)
          PY

      - name: Show repository files
        run: |
          echo "Current directory:"
          pwd
          echo "Root files:"
          ls -la
          echo "Scripts:"
          ls -la automation/scripts || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate TOSS manual candidate file
        run: |
          python automation/scripts/validate_toss_csv.py "$TOSS_MANUAL_CSV_FILE"

      - name: Hotfix source notebook before runtime copy
        run: |
          python automation/scripts/hotfix_v102_series_or.py "$NOTEBOOK_FILE"

      - name: Prepare runtime notebook
        run: |
          python automation/scripts/patch_notebook_config.py "$NOTEBOOK_FILE" "_runtime_report.ipynb"

      - name: Hotfix runtime notebook before execute
        run: |
          python automation/scripts/hotfix_v102_series_or.py "_runtime_report.ipynb"

      - name: Run report notebook
        run: |
          jupyter nbconvert --to notebook --execute "_runtime_report.ipynb" --output executed_report.ipynb --ExecutePreprocessor.timeout=5400

      - name: Add Naver news summary and optional OpenAI interpretation
        run: |
          python automation/scripts/add_naver_news_summary.py

      - name: Rebuild clean HTML briefing report
        run: |
          python automation/scripts/rebuild_clean_html_report.py

      - name: Archive AM/PM session report
        run: |
          python automation/scripts/archive_session_report.py

      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs stock_report *.xlsx *.zip executed_report.ipynb || true
          git commit -m "Update daily stock report" || echo "No changes to commit"
          git push || true
